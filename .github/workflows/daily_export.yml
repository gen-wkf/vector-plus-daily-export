name: Daily Vecteur Plus Export

on:
  schedule:
    - cron: "0 6 * * *" # Tous les jours à 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-export:
    runs-on: ubuntu-latest
    env:
      VECTEUR_PLUS_PASSWORD: ${{ secrets.VECTEUR_PLUS_PASSWORD }}
      BASE_URL_VECTEUR_PLUS: ${{ secrets.VECTEUR_PLUS_BASE_URL }}
      BASE_URL: ${{ secrets.VECTEUR_PLUS_BASE_URL }}
      ID_CLIENTS: ${{ secrets.ID_CLIENTS }}
      ID_APPLICATIONS: ${{ secrets.ID_APPLICATIONS }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run export_vecteur_markets.py
        run: |
          cmd=(python scripts/export_vecteur_markets.py --output-prefix responses/all_markets --password "$VECTEUR_PLUS_PASSWORD")
          if [ -n "$BASE_URL" ]; then
            cmd+=(--base-url "$BASE_URL")
          fi
          if [ -n "$ID_CLIENTS" ]; then
            cmd+=(--client-ids "$ID_CLIENTS")
          fi
          if [ -n "$ID_APPLICATIONS" ]; then
            cmd+=(--application-ids "$ID_APPLICATIONS")
          fi
          "${cmd[@]}"

      - name: Run convert_json_to_table.py
        run: |
          python scripts/convert_json_to_table.py responses/all_markets.json responses/markets

      - name: Commit generated export files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add responses/*.json responses/*.csv responses/*.xlsx || true
          if git diff --cached --quiet; then
            echo "No generated files changed; nothing to commit."
          else
            git commit -m "Automated daily export: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Send export via email
        if: env.SENDER_EMAIL != ''
        run: |
          python scripts/send_export_mail.py \
            "$SMTP_HOST" \
            "$SMTP_PORT" \
            "$SENDER_EMAIL" \
            "$SENDER_PASSWORD" \
            "$RECIPIENT_EMAIL" \
            "responses/markets.xlsx"

      - name: Upload export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vecteur-plus-daily-export
          path: |
            responses/all_markets.json
            responses/all_markets.csv
            responses/all_markets.xlsx
            responses/markets.csv
            responses/markets.xlsx
            responses/all_markets_errors.json
